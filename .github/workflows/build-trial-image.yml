# بناء صورة النسخة التجريبية ودفعها إلى Docker Hub — يعمل تلقائياً عند كل دفعة لهذا الفرع
# الأسرار المطلوبة في إعدادات المستودع: DOCKERHUB_USERNAME و DOCKERHUB_TOKEN
name: build-trial-image

on:
  workflow_dispatch:
  push:
    branches: [claude/adoring-meninsky-e8db74]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shakeeb-net:trial
            ${{ secrets.DOCKERHUB_USERNAME }}/shakeeb-net:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # النشر الذاتي: تثبيت الصورة الجديدة على Azure فور نجاح البناء — دفعة = موقع محدث
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: deploy-to-azure
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az containerapp update -n app-shakeeb-test -g rg-shakeeb-test --image "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/shakeeb-net:sha-${{ github.sha }}"
